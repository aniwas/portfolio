<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel With Thumbnail Strip</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #0f172a;
        color: #fff;
      }

      .carousel-wrapper {
        max-width: 980px;
        margin: 40px auto;
      }

      .carousel-item img {
        height: auto;
        object-fit: cover;
      }

      .thumbnail-strip {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 8px 2px;
        scroll-behavior: smooth;
      }

      .thumbnail-strip button {
        border: 0;
        padding: 0;
        background: transparent;
        border-radius: 8px;
        overflow: hidden;
        flex: 0 0 auto;
        opacity: 0.6;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .thumbnail-strip button img {
        width: 98px;
        height: 62px;
        object-fit: cover;
        display: block;
      }

      .thumbnail-strip button.active {
        opacity: 1;
        outline: 3px solid #22d3ee;
        transform: translateY(-2px);
      }

      .thumbnail-strip button:hover {
        opacity: 0.95;
      }
    </style>
  </head>
  <body>
    <div class="container carousel-wrapper">
      <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="false">
        <div class="carousel-inner">
          <div class="carousel-item active">

              alt="Hawk"
            />

              <h5>Hawk</h5>

          </div>

              class="d-block w-100"
              alt="Strawberry"
            />
            <div class="carousel-caption"><h5>Strawberry</h5></div>
          </div>

          <div class="carousel-item">
            <img
              src="https://static.vecteezy.com/system/resources/thumbnails/036/324/708/small_2x/ai-generated-picture-of-a-tiger-walking-in-the-forest-photo.jpg"
              class="d-block w-100"
              alt="Tiger"
            />
            <div class="carousel-caption"><h5>Tiger</h5></div>

          <div class="carousel-item">

              class="d-block w-100"
              alt="Parrot"
            />
            <div class="carousel-caption"><h5>Parrot</h5></div>
          </div>

          <div class="carousel-item">
            <img
              src="https://static.vecteezy.com/system/resources/thumbnails/060/117/855/small_2x/red-rose-is-the-main-focus-of-the-image-with-a-blue-background-and-a-few-other-flowers-in-the-background-the-rose-is-the-most-prominent-and-beautiful-flower-in-the-picture-photo.jpeg"
              class="d-block w-100"
              alt="Rose"
            />
            <div class="carousel-caption"><h5>Rose</h5></div>
          </div>

          <div class="carousel-item">
            <img
              src="https://static.vecteezy.com/system/resources/thumbnails/023/329/367/small_2x/beautiful-image-in-nature-of-monarch-butterfly-on-lantana-flower-generative-ai-photo.jpg"
              class="d-block w-100"
              alt="Butterfly"

            <div class="carousel-caption"><h5>Butterfly</h5></div>

        <div class="thumbnail-strip" id="thumbnailStrip">

            />
          </button>
          <button type="button" data-bs-slide-to="7" aria-label="Slide 8">

              alt="Hummingbird thumbnail"
            />
          </button>
          <button type="button" data-bs-slide-to="8" aria-label="Slide 9">
            <img

              alt="Horse thumbnail"
            />
          </button>
          <button type="button" data-bs-slide-to="9" aria-label="Slide 10">

              alt="Sunflowers thumbnail"
            />
          </button>
          <button type="button" data-bs-slide-to="10" aria-label="Slide 11">
            <img
              src="https://static.vecteezy.com/system/resources/thumbnails/054/572/312/small_2x/this-image-features-a-hoverfly-perched-on-a-green-stem-highlighting-its-striking-yellow-and-black-colors-photo.jpg"
              alt="Hoverfly thumbnail"
            />
          </button>
          <button type="button" data-bs-slide-to="11" aria-label="Slide 12">

              src="https://static.vecteezy.com/system/resources/thumbnails/024/815/857/small_2x/ai-generated-picture-of-little-red-riding-hood-fairytale-personage-walking-in-the-forest-with-basket-in-her-hand-photo.jpeg"
              alt="Little Red Riding Hood thumbnail"
            />
          </button>
        </div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleCaptions"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const carouselEl = document.querySelector('#carouselExampleCaptions');
        const thumbnails = Array.from(
          document.querySelectorAll('#thumbnailStrip button')
        );

        const bsCarousel = bootstrap.Carousel.getOrCreateInstance(carouselEl);

        function setActiveThumbnail(index) {
          thumbnails.forEach((thumb) => thumb.classList.remove('active'));

          const activeThumb = thumbnails[index];
          if (!activeThumb) return;

          activeThumb.classList.add('active');
          activeThumb.scrollIntoView({
            behavior: 'smooth',
            inline: 'center',
            block: 'nearest',
          });
        }

        thumbnails.forEach((thumb) => {
          thumb.addEventListener('click', function () {
            const slideTo = Number(this.dataset.bsSlideTo);
            if (Number.isInteger(slideTo)) {
              bsCarousel.to(slideTo);
            }
          });
        });

        carouselEl.addEventListener('slid.bs.carousel', function (event) {
          setActiveThumbnail(event.to);
        });

        const activeSlide = carouselEl.querySelector('.carousel-item.active');
        const slides = Array.from(carouselEl.querySelectorAll('.carousel-item'));
        const initialIndex = Math.max(0, slides.indexOf(activeSlide));
        setActiveThumbnail(initialIndex);
      });
    </script>
  </body>
</html>
