<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fc;
        }
        .sidebar {
            height: 100vh;
            background: #4e73df;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body onload="checkLogin()">

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4">🚀 My Dashboard</h4>
            <a href="#">Home</a>
            <a href="./img/pdf24_converted.pdf">Profile</a>
            <a href="https://docs.google.com/spreadsheets/d/1tK5YxK8n5ytwTDB7NgUcJDU2pnXFJ8kCXwqDG3D4lkk/edit?usp=sharing">Budget management</a>
            <a href="../resume-website-template/Bootstrap/Accordian/accordian.html">Bootstrap</a>
            <a href="#">Settings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Welcome</h3>
                <span class="badge bg-primary" id="welcomeUser"></span>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow p-4">
                        <h5>Total Users</h5>
                        <h2>120</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-4">
                        <h5>Sales</h5>
                        <h2>$3,450</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-4">
                        <h5>Performance</h5>
                        <h2>85%</h2>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
function checkLogin() {
    let user = localStorage.getItem("loggedInUser");

    if (!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById("welcomeUser").innerText = user;
    }
}

function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
